
spring.datasource.driver-class-name = com.mysql.cj.jdbc.Driver
spring.datasource.url = jdbc:mysql://localhost:3306/contact_manager?useSSL=true
spring.datasource.username = root
spring.datasource.password = root

spring.jpa.show-sql = true

# Hibernate dialect is auto-detected by Spring Boot 3 / Hibernate 6
# Keep the pre-Hibernate-6 shared "hibernate_sequence" id generator so existing rows/ids stay consistent
spring.jpa.properties.hibernate.id.db_structure_naming_strategy=legacy
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto = update


# Enable live reload
spring.devtools.livereload.enabled=true

# Additional configuration (optional)
spring.devtools.livereload.additional-paths=src/main/resources

# JWT settings for the REST API (override the secret via the JWT_SECRET env var in real deployments)
app.jwt.secret = ${JWT_SECRET:0123456789}
app.jwt.expiration-ms = ${JWT_EXPIRATION_MS:86400000}

